<meta name="theme-color" content="#131720">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #131720;
    --surface:  #1c2130;
    --card:     #202840;
    --border:   #2a3350;
    --accent:   #7eb8a4;
    --warm:     #c4a882;
    --mist:     #8fa8c0;
    --red:      #c47a7a;
    --text:     #d8dce8;
    --dim:      #5a6480;
    --white:    #eceef5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 20% 10%, rgba(126,184,164,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(143,168,192,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 430px; margin: 0 auto; padding: 0 0 100px; }

  /* ── Header ── */
  header {
    padding: 52px 24px 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--white);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }
  .app-title em {
    font-style: italic;
    color: var(--accent);
  }
  .week-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    margin-top: 4px;
  }
  .date-line {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── Day Nav ── */
  .day-nav {
    display: flex;
    gap: 6px;
    padding: 16px 24px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 10px;
    border-radius: 12px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 46px;
  }
  .day-pill.active {
    background: var(--card);
    border-color: var(--accent);
  }
  .day-pill:not(.active):hover { background: var(--surface); }
  .day-pill .day-letter {
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .day-pill.active .day-letter { color: var(--accent); }
  .day-pill .day-num {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .day-pill.active .day-num { color: var(--white); }
  .day-pill .day-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .day-pill.done .day-dot { background: var(--accent); }
  .day-pill.partial .day-dot { background: var(--warm); }

  /* ── Content ── */
  .content { padding: 20px 16px; }

  /* ── Day Header ── */
  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding: 0 4px;
  }
  .day-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.02em;
  }
  .day-tag {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }
  .progress-ring-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-pct {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--accent);
    font-weight: 600;
  }

  /* ── Mood ── */
  .mood-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .mood-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .mood-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .mood-row label { flex: 1; cursor: pointer; }
  .mood-row input { display: none; }
  .mood-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 6px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    transition: all 0.15s;
    text-align: center;
  }
  .mood-row input:checked + .mood-btn {
    border-color: var(--accent);
    background: rgba(126,184,164,0.12);
  }
  .mood-emoji { font-size: 20px; }
  .mood-text { font-size: 9px; color: var(--dim); letter-spacing: 0.03em; }

  .energy-row { display: flex; gap: 6px; align-items: center; }
  .energy-label { font-size: 11px; color: var(--dim); width: 60px; }
  .energy-dots { display: flex; gap: 6px; flex: 1; }
  .energy-dot-wrap { flex: 1; cursor: pointer; }
  .energy-dot-wrap input { display: none; }
  .e-dot {
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    transition: all 0.15s;
  }
  .energy-dot-wrap:nth-child(1) input:checked ~ * { display: none; }
  .energy-dot-wrap input:checked + .e-dot { background: var(--accent); }

  /* filled dots effect */
  .energy-dots.level-1 .energy-dot-wrap:nth-child(1) .e-dot { background: var(--accent); }
  .energy-dots.level-2 .energy-dot-wrap:nth-child(-n+2) .e-dot { background: var(--accent); }
  .energy-dots.level-3 .energy-dot-wrap:nth-child(-n+3) .e-dot { background: var(--accent); }
  .energy-dots.level-4 .energy-dot-wrap:nth-child(-n+4) .e-dot { background: var(--warm); }
  .energy-dots.level-5 .energy-dot-wrap:nth-child(-n+5) .e-dot { background: var(--warm); }

  /* ── Activities ── */
  .section-label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 4px;
    margin-bottom: 8px;
  }

  .activity-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

  .activity-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .activity-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background 0.2s;
    border-radius: 14px 0 0 14px;
  }
  .activity-item.checked { background: rgba(126,184,164,0.06); border-color: rgba(126,184,164,0.3); }
  .activity-item.checked::before { background: var(--accent); }

  .activity-emoji { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }

  .activity-info { flex: 1; }
  .activity-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 2px;
    transition: color 0.2s;
  }
  .activity-item.checked .activity-name { color: var(--accent); }
  .activity-detail {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.02em;
  }

  .check-circle {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .activity-item.checked .check-circle {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-icon {
    opacity: 0;
    transition: opacity 0.2s;
    color: var(--bg);
    font-size: 13px;
    font-weight: 700;
  }
  .activity-item.checked .check-icon { opacity: 1; }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(19,23,32,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    max-width: 430px;
    margin: 0 auto;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 12px 0 16px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--dim);
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }
  .nav-text { font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase; }

  /* ── Stats view ── */
  .stats-view { display: none; padding: 20px 16px; }
  .stats-view.visible { display: block; }
  .main-view.hidden { display: none; }

  .stat-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--white);
    margin-bottom: 20px;
    padding: 0 4px;
  }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 24px;
  }
  .week-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .week-cell .wc-day { font-size: 8px; color: var(--dim); text-transform: uppercase; }
  .week-cell .wc-pct { font-size: 11px; font-weight: 500; color: var(--text); }
  .week-cell.wc-good { border-color: rgba(126,184,164,0.4); background: rgba(126,184,164,0.08); }
  .week-cell.wc-good .wc-pct { color: var(--accent); }
  .week-cell.wc-med { border-color: rgba(196,168,130,0.4); background: rgba(196,168,130,0.08); }
  .week-cell.wc-med .wc-pct { color: var(--warm); }

  .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }
  .stat-card-label { font-size: 10px; color: var(--dim); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-card-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--white);
    font-weight: 600;
    line-height: 1;
  }
  .stat-card-sub { font-size: 10px; color: var(--dim); margin-top: 4px; }

  .reset-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* Animation */
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .content, .stats-view { animation: fadeSlide 0.25s ease; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-top">
      <div>
        <div class="app-title">Ma <em>Routine</em></div>
        <div class="date-line" id="headerDate"></div>
      </div>
      <div class="week-badge" id="weekBadge"></div>
    </div>
  </header>

  <div class="day-nav" id="dayNav"></div>

  <!-- Main view -->
  <div class="main-view" id="mainView">
    <div class="content">
      <div class="day-header">
        <div>
          <div class="day-name" id="currentDayName"></div>
          <div class="day-tag" id="currentDayTag"></div>
        </div>
        <div class="progress-ring-wrap">
          <div class="progress-pct" id="progressPct">0%</div>
        </div>
      </div>

      <!-- Mood -->
      <div class="mood-card">
        <div class="mood-label">Humeur du jour</div>
        <div class="mood-row" id="moodRow">
          <label><input type="radio" name="mood" value="1"><div class="mood-btn"><span class="mood-emoji">😶‍🌫️</span><span class="mood-text">Difficile</span></div></label>
          <label><input type="radio" name="mood" value="2"><div class="mood-btn"><span class="mood-emoji">😔</span><span class="mood-text">Moyen</span></div></label>
          <label><input type="radio" name="mood" value="3"><div class="mood-btn"><span class="mood-emoji">😌</span><span class="mood-text">OK</span></div></label>
          <label><input type="radio" name="mood" value="4"><div class="mood-btn"><span class="mood-emoji">🌿</span><span class="mood-text">Bien</span></div></label>
          <label><input type="radio" name="mood" value="5"><div class="mood-btn"><span class="mood-emoji">✨</span><span class="mood-text">Très bien</span></div></label>
        </div>
        <div class="energy-row">
          <div class="energy-label">Énergie</div>
          <div class="energy-dots" id="energyDots">
            <div class="energy-dot-wrap" data-level="1"><div class="e-dot"></div></div>
            <div class="energy-dot-wrap" data-level="2"><div class="e-dot"></div></div>
            <div class="energy-dot-wrap" data-level="3"><div class="e-dot"></div></div>
            <div class="energy-dot-wrap" data-level="4"><div class="e-dot"></div></div>
            <div class="energy-dot-wrap" data-level="5"><div class="e-dot"></div></div>
          </div>
        </div>
      </div>

      <!-- Activities -->
      <div class="section-label">Activités</div>
      <div class="activity-list" id="activityList"></div>
    </div>
  </div>

  <!-- Stats view -->
  <div class="stats-view" id="statsView">
    <div class="stat-title">Cette semaine</div>
    <div class="week-grid" id="weekGrid"></div>
    <div class="stat-cards" id="statCards"></div>
    <button class="reset-btn" id="resetBtn">↺ Réinitialiser la semaine</button>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="navToday" onclick="showView('main')">
      <span class="nav-icon">🌿</span>
      <span class="nav-text">Aujourd'hui</span>
    </button>
    <button class="nav-btn" id="navStats" onclick="showView('stats')">
      <span class="nav-icon">📊</span>
      <span class="nav-text">Semaine</span>
    </button>
  </nav>

</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const DAYS_DATA = [
  {
    name: "Lundi",
    short: "Lu",
    tag: "Activation douce",
    activities: [
      { emoji: "🌬", name: "Cohérence cardiaque", detail: "5 min · au réveil" },
      { emoji: "🚶", name: "Marche extérieure", detail: "30 min · allure tranquille" },
      { emoji: "🧘", name: "Yin yoga", detail: "20–30 min · soir" },
      { emoji: "🌙", name: "Body scan audio", detail: "10 min · coucher" },
    ]
  },
  {
    name: "Mardi",
    short: "Ma",
    tag: "Muscu coach + récup",
    activities: [
      { emoji: "💪", name: "Séance muscu coach", detail: "7h30 · ~1h" },
      { emoji: "🚶", name: "Marche légère", detail: "20–30 min · journée" },
      { emoji: "🧘", name: "Étirements doux", detail: "15–20 min · soir" },
      { emoji: "🌬", name: "Cohérence cardiaque", detail: "5 min · coucher" },
    ]
  },
  {
    name: "Mercredi",
    short: "Me",
    tag: "Cardio doux prioritaire",
    activities: [
      { emoji: "🌬", name: "Cohérence cardiaque", detail: "5 min · matin" },
      { emoji: "🚶", name: "Marche active", detail: "40–45 min · allure soutenue" },
      { emoji: "🌿", name: "Qi gong ou sophrologie", detail: "20 min · soir" },
      { emoji: "🌙", name: "Body scan audio", detail: "10 min · coucher" },
    ]
  },
  {
    name: "Jeudi",
    short: "Je",
    tag: "Muscu seule + décompression",
    activities: [
      { emoji: "🌬", name: "Cohérence cardiaque", detail: "5 min · matin" },
      { emoji: "💪", name: "Séance muscu seule", detail: "45–60 min · journée/soir" },
      { emoji: "🚶", name: "Marche décompression", detail: "10–15 min · post-séance" },
      { emoji: "🧘", name: "Étirements doux", detail: "10 min · coucher" },
    ]
  },
  {
    name: "Vendredi",
    short: "Ve",
    tag: "Cardio doux + système nerveux",
    activities: [
      { emoji: "🌬", name: "Cohérence cardiaque", detail: "5 min · matin" },
      { emoji: "🚶", name: "Marche active", detail: "40–45 min · journée" },
      { emoji: "🧘", name: "Yin yoga long", detail: "30–45 min · soir" },
      { emoji: "🌙", name: "Body scan audio", detail: "10 min · coucher" },
    ]
  },
  {
    name: "Samedi",
    short: "Sa",
    tag: "Sortie nature",
    activities: [
      { emoji: "🌬", name: "Cohérence cardiaque", detail: "5 min · matin" },
      { emoji: "🌲", name: "Marche nature", detail: "45–60 min · Vercors / forêt" },
      { emoji: "✨", name: "Activité libre", detail: "yoga, jardin, créatif…" },
      { emoji: "🌙", name: "Body scan si envie", detail: "10 min · coucher" },
    ]
  },
  {
    name: "Dimanche",
    short: "Di",
    tag: "Repos actif minimal",
    activities: [
      { emoji: "🌬", name: "Cohérence cardiaque", detail: "5 min · si envie" },
      { emoji: "🚶", name: "Marche courte tranquille", detail: "20 min · sans pression" },
      { emoji: "✨", name: "Repos musculaire complet", detail: "jardiner, créer, se poser" },
      { emoji: "🌙", name: "Étirements ou rien", detail: "libre" },
    ]
  }
];

// ── State ─────────────────────────────────────────────────────────────────────
function getWeekKey() {
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const week = Math.ceil(((now - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${now.getFullYear()}-W${week}`;
}

function loadState() {
  const key = getWeekKey();
  const raw = localStorage.getItem('routine_' + key);
  if (raw) return JSON.parse(raw);
  // Default empty state for 7 days
  return DAYS_DATA.map(() => ({
    checked: [],
    mood: null,
    energy: null
  }));
}

function saveState() {
  localStorage.setItem('routine_' + getWeekKey(), JSON.stringify(state));
}

let state = loadState();
let currentDay = (new Date().getDay() + 6) % 7; // 0=Mon, 6=Sun

// ── Render ────────────────────────────────────────────────────────────────────
function getDayProgress(dayIdx) {
  const checked = state[dayIdx].checked.length;
  const total = DAYS_DATA[dayIdx].activities.length;
  return total > 0 ? Math.round((checked / total) * 100) : 0;
}

function renderDayNav() {
  const nav = document.getElementById('dayNav');
  nav.innerHTML = '';
  const today = (new Date().getDay() + 6) % 7;

  DAYS_DATA.forEach((day, i) => {
    const pct = getDayProgress(i);
    const pill = document.createElement('div');
    pill.className = 'day-pill' + (i === currentDay ? ' active' : '') +
                     (pct === 100 ? ' done' : pct > 0 ? ' partial' : '');

    // Get day number for this week
    const now = new Date();
    const diff = i - today;
    const d = new Date(now);
    d.setDate(d.getDate() + diff);

    pill.innerHTML = `
      <span class="day-letter">${day.short}</span>
      <span class="day-num">${d.getDate()}</span>
      <div class="day-dot"></div>
    `;
    pill.addEventListener('click', () => { currentDay = i; renderAll(); });
    nav.appendChild(pill);
  });
}

function renderMainView() {
  const day = DAYS_DATA[currentDay];
  const s = state[currentDay];

  document.getElementById('currentDayName').textContent = day.name;
  document.getElementById('currentDayTag').textContent = day.tag;

  const pct = getDayProgress(currentDay);
  document.getElementById('progressPct').textContent = pct + '%';

  // Mood
  document.querySelectorAll('input[name="mood"]').forEach(inp => {
    inp.checked = (parseInt(inp.value) === s.mood);
    inp.addEventListener('change', () => {
      state[currentDay].mood = parseInt(inp.value);
      saveState();
    });
  });

  // Energy dots
  const energyDots = document.getElementById('energyDots');
  energyDots.className = 'energy-dots' + (s.energy ? ` level-${s.energy}` : '');
  energyDots.querySelectorAll('.energy-dot-wrap').forEach(dot => {
    dot.onclick = () => {
      const level = parseInt(dot.dataset.level);
      state[currentDay].energy = (state[currentDay].energy === level) ? null : level;
      saveState();
      energyDots.className = 'energy-dots' + (state[currentDay].energy ? ` level-${state[currentDay].energy}` : '');
    };
  });

  // Activities
  const list = document.getElementById('activityList');
  list.innerHTML = '';
  day.activities.forEach((act, i) => {
    const isChecked = s.checked.includes(i);
    const item = document.createElement('div');
    item.className = 'activity-item' + (isChecked ? ' checked' : '');
    item.innerHTML = `
      <span class="activity-emoji">${act.emoji}</span>
      <div class="activity-info">
        <div class="activity-name">${act.name}</div>
        <div class="activity-detail">${act.detail}</div>
      </div>
      <div class="check-circle"><span class="check-icon">✓</span></div>
    `;
    item.addEventListener('click', () => {
      const idx = state[currentDay].checked.indexOf(i);
      if (idx > -1) state[currentDay].checked.splice(idx, 1);
      else state[currentDay].checked.push(i);
      saveState();
      renderAll();
    });
    list.appendChild(item);
  });
}

function renderStats() {
  // Week grid
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  DAYS_DATA.forEach((day, i) => {
    const pct = getDayProgress(i);
    const cell = document.createElement('div');
    cell.className = 'week-cell' + (pct === 100 ? ' wc-good' : pct >= 50 ? ' wc-med' : '');
    cell.innerHTML = `<span class="wc-day">${day.short}</span><span class="wc-pct">${pct > 0 ? pct + '%' : '—'}</span>`;
    grid.appendChild(cell);
  });

  // Stat cards
  const totalActs = state.reduce((sum, d) => sum + d.checked.length, 0);
  const daysActive = state.filter(d => d.checked.length > 0).length;
  const avgMood = (() => {
    const moods = state.map(d => d.mood).filter(Boolean);
    if (!moods.length) return null;
    return (moods.reduce((a, b) => a + b, 0) / moods.length).toFixed(1);
  })();
  const moodEmojis = ['😶‍🌫️','😔','😌','🌿','✨'];

  document.getElementById('statCards').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-label">Activités cochées</div>
      <div class="stat-card-value">${totalActs}</div>
      <div class="stat-card-sub">cette semaine</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Jours actifs</div>
      <div class="stat-card-value">${daysActive}</div>
      <div class="stat-card-sub">sur 7 jours</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Humeur moyenne</div>
      <div class="stat-card-value">${avgMood ? moodEmojis[Math.round(avgMood)-1] : '—'}</div>
      <div class="stat-card-sub">${avgMood ? avgMood + '/5' : 'pas encore renseignée'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Complétion moy.</div>
      <div class="stat-card-value">${daysActive > 0 ? Math.round(state.filter(d=>d.checked.length>0).reduce((s,d,i)=>s+getDayProgress(DAYS_DATA.indexOf(DAYS_DATA[state.indexOf(d)])),0)/daysActive) : 0}%</div>
      <div class="stat-card-sub">jours actifs</div>
    </div>
  `;
}

function renderHeader() {
  const now = new Date();
  const opts = { weekday: 'long', day: 'numeric', month: 'long' };
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('fr-FR', opts);
  document.getElementById('weekBadge').textContent =
    'Semaine ' + (() => {
      const jan1 = new Date(now.getFullYear(), 0, 1);
      return Math.ceil(((now - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    })();
}

function renderAll() {
  renderHeader();
  renderDayNav();
  renderMainView();
  renderStats();
}

// ── View toggle ───────────────────────────────────────────────────────────────
function showView(view) {
  const main = document.getElementById('mainView');
  const stats = document.getElementById('statsView');
  const navToday = document.getElementById('navToday');
  const navStats = document.getElementById('navStats');

  if (view === 'main') {
    main.classList.remove('hidden');
    stats.classList.remove('visible');
    navToday.classList.add('active');
    navStats.classList.remove('active');
  } else {
    main.classList.add('hidden');
    stats.classList.add('visible');
    navToday.classList.remove('active');
    navStats.classList.add('active');
    renderStats();
  }
}

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Réinitialiser toutes les données de cette semaine ?')) {
    state = DAYS_DATA.map(() => ({ checked: [], mood: null, energy: null }));
    saveState();
    renderAll();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
