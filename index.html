<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #131720;
    --surface:  #1c2130;
    --card:     #202840;
    --border:   #2a3350;
    --accent:   #7eb8a4;
    --warm:     #c4a882;
    --mist:     #8fa8c0;
    --red:      #c47a7a;
    --text:     #d8dce8;
    --dim:      #5a6480;
    --white:    #eceef5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 20% 10%, rgba(126,184,164,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(143,168,192,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 430px; margin: 0 auto; padding: 0 0 100px; }

  /* ── Header ── */
  header {
    padding: 52px 24px 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--white);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }
  .app-title em {
    font-style: italic;
    color: var(--accent);
  }
  .week-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    margin-top: 4px;
  }
  .date-line {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── Day Nav ── */
  .day-nav {
    display: flex;
    gap: 6px;
    padding: 16px 24px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 10px;
    border-radius: 12px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 46px;
  }
  .day-pill.active {
    background: var(--card);
    border-color: var(--accent);
  }
  .day-pill:not(.active):hover { background: var(--surface); }
  .day-pill .day-letter {
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .day-pill.active .day-letter { color: var(--accent); }
  .day-pill .day-num {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .day-pill.active .day-num { color: var(--white); }
  .day-pill .day-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .day-pill.done .day-dot { background: var(--accent); }
  .day-pill.partial .day-dot { background: var(--warm); }

  /* ── Content ── */
  .content { padding: 20px 16px; }

  /* ── Day Header ── */
  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding: 0 4px;
  }
  .day-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.02em;
  }
  .day-tag {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }
  .progress-ring-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-pct {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--accent);
    font-weight: 600;
  }

  /* ── Mood ── */
  .mood-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .mood-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .mood-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .mood-row label { flex: 1; cursor: pointer; }
  .mood-row input { display: none; }
  .mood-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 6px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    transition: all 0.15s;
    text-align: center;
  }
  .mood-row input:checked + .mood-btn {
    border-color: var(--accent);
    background: rgba(126,184,164,0.12);
  }
  .mood-emoji { font-size: 20px; }
  .mood-text { font-size: 9px; color: var(--dim); letter-spacing: 0.03em; }

  .energy-row { display: flex; gap: 6px; align-items: center; }
  .energy-label { font-size: 11px; color: var(--dim); width: 60px; }
  .energy-dots { display: flex; gap: 6px; flex: 1; }
  .energy-dot-wrap { flex: 1; cursor: pointer; }
  .energy-dot-wrap input { display: none; }
  .e-dot {
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    transition: all 0.15s;
  }
  .energy-dot-wrap:nth-child(1) input:checked ~ * { display: none; }
  .energy-dot-wrap input:checked + .e-dot { background: var(--accent); }

  /* filled dots effect */
  .energy-dots.level-1 .energy-dot-wrap:nth-child(1) .e-dot { background: var(--accent); }
  .energy-dots.level-2 .energy-dot-wrap:nth-child(-n+2) .e-dot { background: var(--accent); }
  .energy-dots.level-3 .energy-dot-wrap:nth-child(-n+3) .e-dot { background: var(--accent); }
  .energy-dots.level-4 .energy-dot-wrap:nth-child(-n+4) .e-dot { background: var(--warm); }
  .energy-dots.level-5 .energy-dot-wrap:nth-child(-n+5) .e-dot { background: var(--warm); }

  /* ── Activities ── */
  .section-label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 4px;
    margin-bottom: 8px;
  }

  .activity-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

  .activity-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .activity-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background 0.2s;
    border-radius: 14px 0 0 14px;
  }
  .activity-item.checked { background: rgba(126,184,164,0.06); border-color: rgba(126,184,164,0.3); }
  .activity-item.checked::before { background: var(--accent); }

  .activity-emoji { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }

  .activity-info { flex: 1; }
  .activity-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 2px;
    transition: color 0.2s;
  }
  .activity-item.checked .activity-name { color: var(--accent); }
  .activity-detail {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.02em;
  }

  .check-circle {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .activity-item.checked .check-circle {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-icon {
    opacity: 0;
    transition: opacity 0.2s;
    color: var(--bg);
    font-size: 13px;
    font-weight: 700;
  }
  .activity-item.checked .check-icon { opacity: 1; }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(19,23,32,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    max-width: 430px;
    margin: 0 auto;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 12px 0 16px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--dim);
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }
  .nav-text { font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase; }

  /* ── Stats view ── */
  .stats-view { display: none; padding: 20px 16px; }
  .stats-view.visible { display: block; }
  .main-view.hidden { display: none; }

  .stat-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--white);
    margin-bottom: 20px;
    padding: 0 4px;
  }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 24px;
  }
  .week-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .week-cell .wc-day { font-size: 8px; color: var(--dim); text-transform: uppercase; }
  .week-cell .wc-pct { font-size: 11px; font-weight: 500; color: var(--text); }
  .week-cell.wc-good { border-color: rgba(126,184,164,0.4); background: rgba(126,184,164,0.08); }
  .week-cell.wc-good .wc-pct { color: var(--accent); }
  .week-cell.wc-med { border-color: rgba(196,168,130,0.4); background: rgba(196,168,130,0.08); }
  .week-cell.wc-med .wc-pct { color: var(--warm); }

  .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }
  .stat-card-label { font-size: 10px; color: var(--dim); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-card-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--white);
    font-weight: 600;
    line-height: 1;
  }
  .stat-card-sub { font-size: 10px; color: var(--dim); margin-top: 4px; }

  .reset-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* Animation */
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .content, .stats-view { animation: fadeSlide 0.25s ease; }

  /* ── Quote ── */
  .quote-card {
    margin: 0 16px 0;
    padding: 14px 18px;
    border-left: 2px solid var(--accent);
    background: linear-gradient(135deg, rgba(126,184,164,0.07) 0%, rgba(143,168,192,0.04) 100%);
  }
  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    font-weight: 300;
    color: var(--text);
    line-height: 1.55;
    letter-spacing: 0.01em;
    margin-bottom: 6px;
  }
  .quote-author {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
</style>

        </div>

      <!-- Activities -->
      <div class="section-label">Activités</div>

  </div>

  <!-- Stats view -->
  <div class="stats-view" id="statsView">
    <div class="stat-title">Cette semaine</div>
    <div class="week-grid" id="weekGrid"></div>
    <div class="stat-cards" id="statCards"></div>
    <button class="reset-btn" id="resetBtn">↺ Réinitialiser la semaine</button>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="navToday" onclick="showView('main')">
      <span class="nav-icon">🌿</span>

// ── State ─────────────────────────────────────────────────────────────────────
function getWeekKey() {
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const week = Math.ceil(((now - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${now.getFullYear()}-W${week}`;
}

function loadState() {
  const key = getWeekKey();
  const raw = localStorage.getItem('routine_' + key);
  if (raw) return JSON.parse(raw);
  // Default empty state for 7 days
  return DAYS_DATA.map(() => ({
    checked: [],
    mood: null,
    energy: null
  }));
}

function saveState() {
  localStorage.setItem('routine_' + getWeekKey(), JSON.stringify(state));
}

let state = loadState();
let currentDay = (new Date().getDay() + 6) % 7; // 0=Mon, 6=Sun

// ── Render ────────────────────────────────────────────────────────────────────
function getDayProgress(dayIdx) {
  const checked = state[dayIdx].checked.length;
  const total = DAYS_DATA[dayIdx].activities.length;
  return total > 0 ? Math.round((checked / total) * 100) : 0;
}

function renderDayNav() {
  const nav = document.getElementById('dayNav');
  nav.innerHTML = '';
  const today = (new Date().getDay() + 6) % 7;

  DAYS_DATA.forEach((day, i) => {
    const pct = getDayProgress(i);
    const pill = document.createElement('div');
    pill.className = 'day-pill' + (i === currentDay ? ' active' : '') +
                     (pct === 100 ? ' done' : pct > 0 ? ' partial' : '');

    // Get day number for this week
    const now = new Date();
    const diff = i - today;
    const d = new Date(now);
    d.setDate(d.getDate() + diff);

    pill.innerHTML = `
      <span class="day-letter">${day.short}</span>
      <span class="day-num">${d.getDate()}</span>
      <div class="day-dot"></div>
    `;
    pill.addEventListener('click', () => { currentDay = i; renderAll(); });
    nav.appendChild(pill);
  });
}

function renderMainView() {
  const day = DAYS_DATA[currentDay];
  const s = state[currentDay];

  document.getElementById('currentDayName').textContent = day.name;
  document.getElementById('currentDayTag').textContent = day.tag;

  const pct = getDayProgress(currentDay);
  document.getElementById('progressPct').textContent = pct + '%';

  // Mood
  document.querySelectorAll('input[name="mood"]').forEach(inp => {
    inp.checked = (parseInt(inp.value) === s.mood);
    inp.addEventListener('change', () => {
      state[currentDay].mood = parseInt(inp.value);
      saveState();
    });
  });

  // Energy dots
  const energyDots = document.getElementById('energyDots');
  energyDots.className = 'energy-dots' + (s.energy ? ` level-${s.energy}` : '');
  energyDots.querySelectorAll('.energy-dot-wrap').forEach(dot => {
    dot.onclick = () => {
      const level = parseInt(dot.dataset.level);
      state[currentDay].energy = (state[currentDay].energy === level) ? null : level;
      saveState();
      energyDots.className = 'energy-dots' + (state[currentDay].energy ? ` level-${state[currentDay].energy}` : '');
    };
  });

  // Activities
  const list = document.getElementById('activityList');
  list.innerHTML = '';
  day.activities.forEach((act, i) => {
    const isChecked = s.checked.includes(i);
    const item = document.createElement('div');
    item.className = 'activity-item' + (isChecked ? ' checked' : '');
    item.innerHTML = `
      <span class="activity-emoji">${act.emoji}</span>
      <div class="activity-info">
        <div class="activity-name">${act.name}</div>
        <div class="activity-detail">${act.detail}</div>
      </div>
      <div class="check-circle"><span class="check-icon">✓</span></div>
    `;
    item.addEventListener('click', () => {
      const idx = state[currentDay].checked.indexOf(i);
      if (idx > -1) state[currentDay].checked.splice(idx, 1);
      else state[currentDay].checked.push(i);
      saveState();
      renderAll();
    });
    list.appendChild(item);
  });
}

function renderStats() {
  // Week grid
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  DAYS_DATA.forEach((day, i) => {
    const pct = getDayProgress(i);
    const cell = document.createElement('div');
    cell.className = 'week-cell' + (pct === 100 ? ' wc-good' : pct >= 50 ? ' wc-med' : '');
    cell.innerHTML = `<span class="wc-day">${day.short}</span><span class="wc-pct">${pct > 0 ? pct + '%' : '—'}</span>`;
    grid.appendChild(cell);
  });

  // Stat cards
  const totalActs = state.reduce((sum, d) => sum + d.checked.length, 0);
  const daysActive = state.filter(d => d.checked.length > 0).length;
  const avgMood = (() => {
    const moods = state.map(d => d.mood).filter(Boolean);
    if (!moods.length) return null;
    return (moods.reduce((a, b) => a + b, 0) / moods.length).toFixed(1);
  })();
  const moodEmojis = ['😶‍🌫️','😔','😌','🌿','✨'];

  document.getElementById('statCards').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-label">Activités cochées</div>
      <div class="stat-card-value">${totalActs}</div>
      <div class="stat-card-sub">cette semaine</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Jours actifs</div>
      <div class="stat-card-value">${daysActive}</div>
      <div class="stat-card-sub">sur 7 jours</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Humeur moyenne</div>
      <div class="stat-card-value">${avgMood ? moodEmojis[Math.round(avgMood)-1] : '—'}</div>
      <div class="stat-card-sub">${avgMood ? avgMood + '/5' : 'pas encore renseignée'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Complétion moy.</div>
      <div class="stat-card-value">${daysActive > 0 ? Math.round(state.filter(d=>d.checked.length>0).reduce((s,d,i)=>s+getDayProgress(DAYS_DATA.indexOf(DAYS_DATA[state.indexOf(d)])),0)/daysActive) : 0}%</div>
      <div class="stat-card-sub">jours actifs</div>
    </div>
  `;
}

function renderHeader() {
  const now = new Date();
  const opts = { weekday: 'long', day: 'numeric', month: 'long' };
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('fr-FR', opts);
  document.getElementById('weekBadge').textContent =
    'Semaine ' + (() => {
      const jan1 = new Date(now.getFullYear(), 0, 1);
      return Math.ceil(((now - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    })();
}

function renderAll() {
  renderHeader();
  renderDayNav();
  renderMainView();
  renderStats();
}

// ── View toggle ───────────────────────────────────────────────────────────────
function showView(view) {
  const main = document.getElementById('mainView');
  const stats = document.getElementById('statsView');
  const navToday = document.getElementById('navToday');
  const navStats = document.getElementById('navStats');

  if (view === 'main') {
    main.classList.remove('hidden');
    stats.classList.remove('visible');
    navToday.classList.add('active');
    navStats.classList.remove('active');
  } else {
    main.classList.add('hidden');
    stats.classList.add('visible');
    navToday.classList.remove('active');
    navStats.classList.add('active');
    renderStats();
  }
}

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Réinitialiser toutes les données de cette semaine ?')) {
    state = DAYS_DATA.map(() => ({ checked: [], mood: null, energy: null }));
    saveState();
    renderAll();
  }
});

  { text: "La forêt absorbe ce que tu portes. Laisse-la faire.", author: "Anonyme" },
  { text: "Là où tu plantes ta présence, quelque chose pousse toujours.", author: "Anonyme" },
  { text: "Le courage, c\'est aussi de s\'accorder le droit de ne pas tout gérer.", author: "Anonyme" },
  { text: "La lune ne s\'excuse pas de ses phases. Toi non plus.", author: "Anonyme" },
  { text: "Le temps passé dans la nature n\'est jamais du temps perdu.", author: "Anonyme" },
  { text: "L\'obscurité est simplement la preuve que quelque part, une lumière attend.", author: "Anonyme" },
  { text: "Ne lutte pas contre la rivière. Apprends à nager avec elle.", author: "Anonyme" },
  { text: "Ta valeur ne diminue pas parce que quelqu\'un ne voit pas ta lumière.", author: "Anonyme" },
  { text: "Chaque fois que tu choisis le soin plutôt que la culpabilité, tu grandis.", author: "Anonyme" },
  { text: "Ralentir n\'est pas abandonner. C\'est parfois la seule façon d\'arriver.", author: "Anonyme" },
  { text: "Les racines profondes ne craignent pas la tempête.", author: "Anonyme" },
  { text: "Tip : Écrire 3 choses positives de ta journée avant de dormir réduit le cortisol nocturne et améliore la qualité du sommeil.", author: "Bien-être" },
  { text: "Tip : La règle des 5 minutes — si quelque chose te prend moins de 5 minutes, fais-le maintenant. Ça libère l\'espace mental.", author: "Bien-être" },
  { text: "Tip : Sortir dehors dans les 30 premières minutes après le réveil synchronise ton horloge biologique et aide le cortisol à suivre sa courbe naturelle.", author: "Chronobiologie" },
  { text: "Tip : Le simple fait de nommer une émotion (\'je me sens anxieuse\') active le cortex préfrontal et réduit l\'intensité émotionnelle.", author: "Neurosciences" },
  { text: "Tip : Une marche de 20 minutes en nature réduit le niveau de cortisol de façon mesurable, même sans effort physique intense.", author: "Recherche" },
  { text: "Tip : Boire un grand verre d\'eau au réveil, avant le café, réhydrate le corps après 8h de jeûne et aide les reins à éliminer.", author: "Santé" },
  { text: "Tip : La cohérence cardiaque (5-5 respiration) active le nerf vague et passe le système nerveux en mode parasympathique en moins de 3 minutes.", author: "Bien-être" },
  { text: "Tip : Éteindre les notifications non essentielles réduit la charge cognitive et l\'anxiété de fond. Essaie pendant une journée.", author: "Bien-être" },
  { text: "Tip : La règle du 80/20 s\'applique aussi à la santé — 80% de tes résultats viennent de 20% de tes habitudes. Identifie les 20% qui comptent.", author: "Bien-être" },
  { text: "Tip : Manger lentement et en pleine conscience augmente la satiété et réduit la réponse insulinique. 20 minutes minimum pour un repas.", author: "Nutrition" },
  { text: "Tip : Le magnésium bisglycinate pris le soir améliore la qualité du sommeil profond et réduit la tension musculaire. À discuter avec ton médecin.", author: "Santé" },
  { text: "Tip : La gratitude pratiquée régulièrement modifie littéralement la structure neuronale du cerveau et réduit l\'anxiété chronique.", author: "Neurosciences" },
  { text: "Tip : Fixer une heure de coucher régulière est plus efficace que fixer une heure de lever pour réguler le rythme circadien.", author: "Chronobiologie" },
  { text: "Tip : Le perfectionnisme non maîtrisé est l\'un des plus grands consommateurs d\'énergie mentale. Bien fait vaut mieux que parfait.", author: "Bien-être" },
  { text: "Tip : Après une séance de sport, le corps met 45 à 60 minutes pour que le cortisol redescende. Prévois un moment calme après l\'effort.", author: "Physiologie" },
  { text: "Tip : L\'exposition à la lumière naturelle le matin synchronise la mélatonine et améliore la qualité du sommeil nocturne.", author: "Chronobiologie" },
  { text: "Tip : Les plantes d\'intérieur ne purifient pas vraiment l\'air — mais elles réduisent le stress et augmentent la créativité. L\'effet est réel.", author: "Bien-être" },
  { text: "Tip : Une sieste de 20 minutes (pas plus) améliore la concentration sans entrer en sommeil profond ni perturber la nuit.", author: "Sommeil" },
  { text: "Tip : L\'anxiété et l\'excitation produisent exactement les mêmes sensations physiques. Renommer \'je suis excitée\' plutôt que \'je suis anxieuse\' change la performance.", author: "Psychologie" },
  { text: "Tip : Marcher pieds nus sur l\'herbe ou la terre (grounding) réduit l\'inflammation mesurable dans le corps selon plusieurs études.", author: "Bien-être" },
  { text: "Tip : Le cerveau ne peut pas faire la différence entre un souvenir vivace et la réalité. Visualiser une réussite active les mêmes zones que la vivre.", author: "Neurosciences" },
  { text: "Tip : Les émotions non exprimées ne disparaissent pas — elles se stockent. Écrire, parler, créer sont des sorties saines.", author: "Psychologie" },
  { text: "Tip : Réduire la caféine de 14h30 améliore le sommeil profond de façon significative, même si tu t\'endors facilement.", author: "Sommeil" },
  { text: "Tip : Le froid doux (fenêtre ouverte la nuit, douche tiède-fraîche) améliore la durée du sommeil profond.", author: "Sommeil" },
  { text: "Tip : Limiter les décisions triviales (tenue, repas du soir) libère de l\'énergie mentale pour ce qui compte vraiment — c\'est ce que faisait Steve Jobs.", author: "Bien-être" },
  { text: "Tip : L\'auto-compassion est plus efficace que l\'auto-critique pour améliorer ses performances sur le long terme. La science le confirme.", author: "Psychologie" },
  { text: "Tip : Le yin yoga active le système nerveux parasympathique plus efficacement que le yoga dynamique, en tenant les postures 3 à 5 minutes.", author: "Bien-être" },
  { text: "Tip : Parler à voix haute à soi-même (à la troisième personne) réduit l\'anxiété et améliore la prise de décision.", author: "Psychologie" },
  { text: "Tip : La douche froide du matin (même 30 secondes) augmente la dopamine de 250% selon une étude de l\'Université de Rotterdam.", author: "Recherche" },
  { text: "Tip : Mettre son téléphone dans une autre pièce pendant le repas améliore la qualité de la digestion et réduit le stress cortisol.", author: "Bien-être" },
  { text: "Tip : Le chant (même sous la douche) libère des endorphines, de l\'ocytocine et réduit le cortisol. C\'est gratuit et efficace.", author: "Bien-être" },
  { text: "Tip : Fixer une tâche simple et la finir libère de la dopamine. Commencer par la plus petite crée un élan.", author: "Neurosciences" },
  { text: "Tip : Les études montrent que 150 minutes de marche par semaine réduit le risque de dépression de 26%. Soit environ 21 minutes par jour.", author: "Recherche" },
  { text: "Tip : Prendre ses médicaments à la même heure chaque jour améliore leur efficacité et crée une ancre mentale pour la régularité.", author: "Santé" },
  { text: "Tip : L\'odeur de la forêt (les phytoncides) réduit le cortisol, augmente les cellules NK (immunitaires) et améliore l\'humeur.", author: "Recherche" },
  { text: "Tip : Créer un rituel de fin de journée de travail (même symbolique) aide le cerveau à décompresser et réduit le cortisol vespéral.", author: "Bien-être" },
  { text: "Tip : Les protéines au petit déjeuner (ou premier repas) stabilisent la glycémie pour toute la journée et réduisent les fringales.", author: "Nutrition" },
  { text: "Tip : Le contact physique (même se serrer dans ses propres bras) libère de l\'ocytocine et réduit la réponse au stress.", author: "Psychologie" },
  { text: "Tip : Réduire le temps sur les réseaux sociaux de 30 minutes par jour améliore le bien-être subjectif autant qu\'une activité physique régulière.", author: "Recherche" },
  { text: "Tip : Tenir un journal de gratitude pendant 21 jours consécutifs reconfigure les circuits neuronaux vers plus d\'optimisme.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Le microbiome intestinal communique directement avec le cerveau via le nerf vague — c\'est le deuxième cerveau. Ce que tu manges influence ton humeur.", author: "Santé" },
  { text: "Le saviez-vous ? Le corps produit naturellement du cortisol entre 6h et 8h du matin pour te réveiller — c\'est pour ça que le réveil est difficile si tu es déjà à bout.", author: "Physiologie" },
  { text: "Le saviez-vous ? La vitamine D est en réalité une hormone, pas une vitamine. Son manque est lié à la dépression, la fatigue et la prise de poids.", author: "Santé" },
  { text: "Le saviez-vous ? Le manque de sommeil d\'une seule nuit suffit à augmenter le cortisol de 37% le lendemain.", author: "Recherche" },
  { text: "Le saviez-vous ? Les muscles brûlent des calories même au repos — 1 kg de muscle brûle environ 13 kcal par jour sans rien faire.", author: "Physiologie" },
  { text: "Le saviez-vous ? Le stress chronique rétrécit littéralement l\'hippocampe, la zone du cerveau liée à la mémoire et à la régulation émotionnelle.", author: "Neurosciences" },
  { text: "Le saviez-vous ? La marche rapide active les mêmes zones du cerveau que la méditation et réduit le bruit mental.", author: "Neurosciences" },
  { text: "Le saviez-vous ? L\'intestin produit 90% de la sérotonine du corps. La santé digestive est directement liée à l\'humeur.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les femmes ont un cycle de cortisol légèrement différent de celui des hommes et sont plus sensibles à sa dysrégulation.", author: "Recherche" },
  { text: "Le saviez-vous ? Le corps humain contient plus de cellules bactériennes que de cellules humaines. Tu es autant microbiome qu\'humaine.", author: "Biologie" },
  { text: "Le saviez-vous ? Les pleurs libèrent du cortisol et des toxines de stress via les larmes. Pleurer est une réponse physiologique saine.", author: "Physiologie" },
  { text: "Le saviez-vous ? La respiration est le seul système autonome que tu peux contrôler consciemment — c\'est la porte d\'entrée vers le système nerveux.", author: "Physiologie" },
  { text: "Le saviez-vous ? Une carence en magnésium touche environ 70% des Françaises et se manifeste par anxiété, fatigue et crampes.", author: "Santé" },
  { text: "Le saviez-vous ? Le cerveau consomme 20% de l\'énergie du corps alors qu\'il ne représente que 2% du poids. Les pensées consomment de l\'énergie réelle.", author: "Neurosciences" },
  { text: "Le saviez-vous ? L\'activité physique régulière est aussi efficace que les antidépresseurs dans les dépressions légères à modérées selon plusieurs méta-analyses.", author: "Recherche" },
  { text: "Le saviez-vous ? Le corps cicatrise principalement pendant le sommeil profond. Sans sommeil de qualité, la récupération est deux fois plus lente.", author: "Physiologie" },
  { text: "Le saviez-vous ? Regarder de la verdure (arbres, plantes) pendant 20 minutes réduit la pression artérielle et le cortisol de façon mesurable.", author: "Recherche" },
  { text: "Le saviez-vous ? Le stress chronique ralentit le métabolisme de base. Le corps en état de survie stocke l\'énergie plutôt que de la brûler.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les femmes sont biologiquement plus sensibles au manque de sommeil que les hommes — leur cerveau a besoin de plus de récupération.", author: "Recherche" },
  { text: "Le saviez-vous ? L\'inflammation chronique de bas grade, souvent causée par le stress, est impliquée dans la dépression, l\'obésité et les maladies chroniques.", author: "Santé" },
  { text: "Le saviez-vous ? La créativité (dessin, couture, musique) active le système de récompense dopaminergique exactement comme l\'exercice physique.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Le corps absorbe mieux le magnésium par voie cutanée (bain au sel d\'Epsom) que par voie orale pour certaines personnes.", author: "Santé" },
  { text: "Le saviez-vous ? Les émotions durent physiologiquement 90 secondes. Ce qui dure plus longtemps, c\'est la pensée qui relance le circuit.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Le yoga yin agit sur les fascias, les tissus conjonctifs qui stockent littéralement la tension émotionnelle chronique.", author: "Bien-être" },
  { text: "Le saviez-vous ? La serotonine est synthétisée à partir du tryptophane — présent dans les œufs, la dinde, le fromage, les graines de courge.", author: "Nutrition" },
  { text: "Le saviez-vous ? Marcher en forêt (shinrin-yoku) pendant 2h augmente les cellules immunitaires NK jusqu\'à 50% et l\'effet dure une semaine.", author: "Recherche" },
  { text: "Le saviez-vous ? Le corps perd environ 500ml d\'eau pendant la nuit par la respiration et la transpiration. Se réhydrater au réveil est crucial.", author: "Physiologie" },
  { text: "Le saviez-vous ? La lumière bleue des écrans le soir inhibe la mélatonine jusqu\'à 3h après l\'exposition, repoussant le sommeil profond.", author: "Chronobiologie" },
  { text: "Le saviez-vous ? L\'ISRS (comme la sertraline) peut prendre 4 à 6 semaines pour atteindre son plein effet sur la sérotonine.", author: "Santé" },
  { text: "Le saviez-vous ? Les fascias, tissu qui entoure chaque muscle, sont parcourus de plus de récepteurs nerveux que les muscles eux-mêmes.", author: "Physiologie" },
  { text: "Le saviez-vous ? La noradrénaline libérée lors du stress chronique contribue à l\'accumulation de graisse abdominale en activant des récepteurs spécifiques.", author: "Physiologie" },
  { text: "Le saviez-vous ? L\'odeur de la lavande réduit l\'activité du système nerveux sympathique (stress) de façon prouvée en 5 minutes.", author: "Recherche" },
  { text: "Le saviez-vous ? Le corps en état de stress chronique sur-active l\'amygdale (centre de l\'alarme) et sous-active le cortex préfrontal (rationnel).", author: "Neurosciences" },
  { text: "Le saviez-vous ? Le simple fait d\'anticiper quelque chose de plaisant (une promenade, un repas) libère de la dopamine — pas besoin que ça arrive.", author: "Neurosciences" },
  { text: "Le saviez-vous ? L\'exercice de force (musculation) est l\'un des rares leviers qui améliore la sensibilité à l\'insuline sur le long terme.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les personnes qui tiennent un journal de bord de leurs habitudes maintiennent leurs nouvelles habitudes deux fois plus longtemps.", author: "Recherche" },
  { text: "Le saviez-vous ? La chaleur (bain chaud, sauna doux) augmente les ondes delta du sommeil et améliore la récupération hormonale nocturne.", author: "Sommeil" },
  { text: "Le saviez-vous ? Le corps produit plus de collagène la nuit. Manger des protéines le soir soutient la réparation musculaire et cutanée pendant le sommeil.", author: "Physiologie" },
  { text: "Le saviez-vous ? La connexion sociale est l\'un des plus puissants régulateurs du cortisol — l\'isolement chronique augmente le cortisol autant que le manque de sommeil.", author: "Recherche" },
  { text: "Le saviez-vous ? Le diaphragme est directement connecté au nerf vague. Une respiration abdominale lente active immédiatement le mode parasympathique.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les SSRI peuvent modifier la sensibilité aux hormones du stress, rendant certaines personnes plus réactives ou moins réactives au cortisol.", author: "Santé" },
  { text: "Le saviez-vous ? Le corps humain renouvelle entièrement son épiderme en 28 jours et son squelette en 10 ans. Tu es littéralement en transformation constante.", author: "Biologie" },
  { text: "Le saviez-vous ? Le Qi Gong pratiqué 3 fois par semaine réduit le cortisol salivaire de 20 à 30% sur 8 semaines dans plusieurs études.", author: "Recherche" },
  { text: "Le saviez-vous ? Le manque de lumière naturelle en hiver réduit la synthèse de vitamine D et de sérotonine simultanément — c\'est pour ça que la dépression saisonnière existe.", author: "Santé" },
  { text: "Le saviez-vous ? La perception d\'avoir le contrôle sur sa vie est l\'un des plus puissants facteurs de protection contre le stress chronique.", author: "Psychologie" },
  { text: "Le saviez-vous ? L\'odorat est le seul sens directement connecté au système limbique (émotions) sans passer par le thalamus. Les odeurs déclenchent des émotions plus vite que les images.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Le tissu adipeux (graisse) n\'est pas passif — il sécrète des hormones appelées adipokines qui influencent l\'inflammation et le cortisol.", author: "Physiologie" },
  { text: "Le saviez-vous ? Tenir ses engagements envers soi-même, même les petits, renforce la confiance en soi plus que les grandes réussites ponctuelles.", author: "Psychologie" },
  { text: "Le saviez-vous ? La prise de poids liée au cortisol se fait préférentiellement autour des organes (graisse viscérale), plus dangereuse que la graisse sous-cutanée.", author: "Santé" },
  { text: "Le saviez-vous ? Le cerveau consomme plus d\'énergie pendant le rêve (sommeil REM) que pendant l\'éveil. Les rêves sont un traitement actif des émotions.", author: "Neurosciences" },
  { text: "Le saviez-vous ? L\'exposition au vert naturel (forêt, parc) réduit l\'activité dans le cortex préfrontal médial, la zone liée à la rumination.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Les fascias relâchent leur tension en 90 à 120 secondes de maintien d\'une posture — c\'est pourquoi le yin yoga tient les postures si longtemps.", author: "Physiologie" },
  { text: "Le saviez-vous ? Le corps stocke l\'énergie sous forme de glycogène (sucre) dans les muscles et le foie avant de stocker en graisse. La musculation augmente cette capacité.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les personnes qui dorment moins de 6h par nuit ont un appétit 24% plus élevé le lendemain, notamment pour les aliments gras et sucrés.", author: "Recherche" },
  { text: "Le saviez-vous ? La marche en avant-midi (entre 9h et 12h) est la plus efficace pour réguler le cortisol grâce à la lumière et à l\'activité synchronisées.", author: "Chronobiologie" },
  { text: "Le saviez-vous ? L\'hippocampe — zone du cerveau liée à la mémoire — peut se régénérer grâce à l\'exercice aérobique régulier. C\'est l\'une des rares zones cérébrales à se renouveler.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Le son de l\'eau courante (pluie, ruisseau) déclenche une réponse de relaxation dans le cerveau similaire au bruit rose.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Une alimentation riche en oméga-3 réduit l\'inflammation et améliore la réponse au cortisol sur 8 à 12 semaines.", author: "Nutrition" },
  { text: "Le saviez-vous ? La respiration par le nez (et non la bouche) filtre l\'air, humidifie l\'oxygène et active mieux le nerf vague que la respiration buccale.", author: "Physiologie" },
  { text: "Le saviez-vous ? L\'insuline et le cortisol sont antagonistes — quand l\'un monte, l\'autre tend à monter aussi, créant un cycle de stockage de graisse.", author: "Physiologie" },
  { text: "Le saviez-vous ? Le microbiome intestinal est unique comme une empreinte digitale. Diversifier l\'alimentation est le moyen le plus simple de l\'améliorer.", author: "Nutrition" },
  { text: "Le saviez-vous ? Les personnes qui font de la musculation ont en moyenne un niveau de cortisol basal plus bas que les sédentaires, malgré des pics plus élevés à l\'effort.", author: "Recherche" },
  { text: "Le saviez-vous ? Le sommeil consolide non seulement les souvenirs mais aussi les apprentissages moteurs — les progrès en musculation se font la nuit.", author: "Sommeil" },
  { text: "Le saviez-vous ? Le contact régulier avec des amis ou proches est un des seuls facteurs de longévité cohérent dans toutes les cultures étudiées.", author: "Recherche" },
  { text: "Le saviez-vous ? La chaleur des mains réchauffées par une boisson chaude augmente la perception de chaleur émotionnelle envers les autres.", author: "Psychologie" },
  { text: "Le saviez-vous ? Le corps met 21 jours à créer une nouvelle connexion neuronale, mais 66 jours en moyenne pour qu\'une habitude devienne automatique.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Écouter de la musique que tu aimes libère de la dopamine dans le noyau accumbens — la même zone activée par la nourriture et l\'exercice.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Les personnes qui se parlent avec bienveillance récupèrent plus vite après un échec que celles qui s\'auto-critiquent.", author: "Psychologie" },
  { text: "Le saviez-vous ? L\'ocytocine (hormone du lien) est libérée par le toucher, le regard, le rire partagé. Elle réduit directement le cortisol.", author: "Physiologie" },
  { text: "Le saviez-vous ? Le foie dégrade le cortisol en cortisone. Un foie surchargé (alcool, médicaments, sucre) ralentit cette dégradation.", author: "Physiologie" },
  { text: "Le saviez-vous ? La nature immersive (forêt dense, brouillard, nuit étoilée) active ce que les chercheurs appellent l\'awe — un état qui réduit l\'égo et l\'anxiété.", author: "Recherche" },
  { text: "Le saviez-vous ? Les personnes ayant un but dans la vie ont un niveau de cortisol basal plus bas et une meilleure résilience au stress.", author: "Recherche" },
  { text: "Le saviez-vous ? La sophrologie est la seule technique de relaxation créée par un médecin (Alfonso Caycedo) spécifiquement pour les troubles du stress.", author: "Bien-être" },
  { text: "Le saviez-vous ? Le gras corporel n\'est pas seulement du stockage — il sécrète de l\'estradiol, de la leptine et de l\'interleukine-6, influençant directement l\'humeur.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les personnes qui font 10 minutes de marche par jour ont un microbiome intestinal plus diversifié que les sédentaires.", author: "Recherche" },
  { text: "Le saviez-vous ? La lumière du soir (même artificielle) supprime la mélatonine 2 fois plus chez les femmes que chez les hommes.", author: "Chronobiologie" },
  { text: "Le saviez-vous ? Le Qi Gong vient du mot qi (énergie vitale) et gong (travail, maîtrise). C\'est littéralement \'travailler son énergie\'.", author: "Culture" },
  { text: "Le saviez-vous ? L\'hypothyroïdie subclinique (thyroïde légèrement sous-active) est souvent associée à un cortisol élevé — les deux se co-régulent.", author: "Santé" },
  { text: "Le saviez-vous ? La cohérence cardiaque réduit la pression artérielle en 8 semaines de pratique quotidienne autant que certains médicaments.", author: "Recherche" },
  { text: "Le saviez-vous ? Le toucher doux (caresse, massage) active les fibres C-tactiles qui envoient directement un signal de sécurité au cerveau.", author: "Physiologie" },
  { text: "Le saviez-vous ? La créativité artisanale (couture, poterie, cuir) induit un état de flow qui réduit le cortisol autant que la méditation.", author: "Recherche" },
  { text: "Avancer, même doucement, reste avancer. La constance bat toujours l\'intensité.", author: "Anonyme" },
  { text: "Chaque habitude maintenue est une promesse tenue à toi-même.", author: "Anonyme" },
  { text: "Le soin de soi n\'est pas égoïste. C\'est ce qui te permet de tout le reste.", author: "Anonyme" },
  { text: "Tu n\'as pas à tout régler en un jour. Un geste, un souffle, un pas.", author: "Anonyme" },
  { text: "La santé se construit dans le silence des petits gestes, pas dans les grands éclats.", author: "Anonyme" },
  { text: "Chaque jour que tu te lèves et que tu essaies, tu gagnes.", author: "Anonyme" },
  { text: "Tip : La pleine conscience ne demande pas de méditer 30 minutes. Observer 3 respirations conscientes avant de manger suffit à activer le parasympathique.", author: "Bien-être" },
  { text: "Tip : Écouter ta liste musicale préférée pendant la marche augmente l\'adhérence à l\'exercice de 28% selon une étude de Brunel University.", author: "Recherche" },
  { text: "Tip : Prendre un bain chaud 1h à 2h avant de dormir abaisse la température corporelle ensuite, signal que le cerveau interprète comme une heure de dormir.", author: "Sommeil" },
  { text: "Tip : Le journaling de 10 minutes par jour réduit l\'activité de l\'amygdale et améliore la régulation émotionnelle sur 4 semaines.", author: "Psychologie" },
  { text: "Tip : Faire son lit le matin est l\'une des habitudes les plus associées à la productivité et au bien-être — petite victoire qui lance la journée.", author: "Bien-être" },
  { text: "Tip : L\'exercice en plein air offre des bénéfices supplémentaires sur l\'humeur comparé au même exercice en intérieur — même par temps couvert.", author: "Recherche" },
  { text: "Tip : Identifier 3 priorités maximum pour la journée réduit la charge mentale et augmente le taux d\'accomplissement.", author: "Bien-être" },
  { text: "Tip : Les étirements le soir activent le système parasympathique et signalent au corps qu\'il est en sécurité pour dormir.", author: "Bien-être" },
  { text: "Tip : Manger dans des horaires réguliers stabilise le microbiome, la glycémie et le cortisol — plus encore que le contenu des repas.", author: "Nutrition" },
  { text: "Tip : Couper les notifications push sur le téléphone la nuit réduit les micro-réveils et améliore la qualité du sommeil profond.", author: "Sommeil" },
  { text: "Tip : La respiration 4-7-8 (inspirer 4s, retenir 7s, expirer 8s) est l\'une des techniques les plus rapides pour calmer une montée d\'anxiété.", author: "Bien-être" },
  { text: "Tip : Regarder des vidéos de nature ou de forêt réduit le cortisol presque autant que d\'être en nature réelle — le cerveau est facilement trompé en bien.", author: "Recherche" },
  { text: "Tip : Planifier ses repas de la semaine le dimanche réduit le stress alimentaire quotidien et améliore la qualité nutritionnelle.", author: "Nutrition" },
  { text: "Tip : Les odeurs de cèdre, de vétiver et de mousse activent les mêmes récepteurs que les phytoncides en forêt. La parfumerie peut aider.", author: "Bien-être" },
  { text: "Tip : Le yoga nidra (yoga du sommeil) de 30 minutes est équivalent à 2h de sommeil en termes de récupération nerveuse.", author: "Bien-être" },
  { text: "Tip : Limiter l\'alcool à 1 verre maximum, 3h avant le coucher au minimum, pour ne pas perturber le sommeil REM.", author: "Sommeil" },
  { text: "Tip : Apprendre quelque chose de nouveau stimule la plasticité neuronale et réduit le risque de déclin cognitif lié à l\'âge.", author: "Neurosciences" },
  { text: "Tip : Le contact avec des animaux (caresser un chat, un chien) libère de l\'ocytocine et réduit le cortisol en quelques minutes.", author: "Bien-être" },
  { text: "Tip : Créer une liste de \'petits plaisirs\' accessibles (musique, promenade, thé) et la consulter quand le moral baisse — l\'anticipation suffit.", author: "Psychologie" },
  { text: "Tip : Faire une chose à la fois (monotasking) est plus efficace que le multitâche et réduit le cortisol. Le cerveau n\'est pas fait pour le multitâche.", author: "Bien-être" },
  { text: "Le saviez-vous ? Le cerveau humain traite les informations négatives 5 fois plus vite que les positives — c\'est un biais de survie archaïque.", author: "Neurosciences" },
  { text: "Le saviez-vous ? La caféine bloque les récepteurs à l\'adénosine (molécule de sommeil) mais ne la supprime pas — elle s\'accumule et cause le crash.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les personnes qui mangent des fermentés (yaourt, kéfir, choucroute) ont une diversité microbienne intestinale significativement plus élevée.", author: "Nutrition" },
  { text: "Le saviez-vous ? Les femmes métabolisent l\'alcool différemment des hommes — à même quantité, le taux sanguin est plus élevé et la détox plus lente.", author: "Physiologie" },
  { text: "Le saviez-vous ? Le magnésium est co-facteur de plus de 300 réactions enzymatiques dans le corps — il est impliqué dans la production d\'énergie cellulaire.", author: "Santé" },
  { text: "Le saviez-vous ? Les personnes créatives ont un cerveau qui montre plus de connectivité entre le réseau du mode par défaut et le réseau exécutif.", author: "Neurosciences" },
  { text: "Le saviez-vous ? L\'entraînement de force augmente la densité osseuse — particulièrement important pour les femmes après 30 ans.", author: "Physiologie" },
  { text: "Le saviez-vous ? La photothérapie (lampe de luminothérapie 10 000 lux le matin) est aussi efficace que les antidépresseurs pour la dépression saisonnière.", author: "Recherche" },
  { text: "Le saviez-vous ? Le stress oxydatif (excès de radicaux libres) est accéléré par le cortisol chronique et accélère le vieillissement cellulaire.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les personnes qui pratiquent l\'auto-compassion ont des niveaux d\'inflammation plus bas mesurés par la CRP.", author: "Recherche" },
  { text: "Le saviez-vous ? Le corps dépense plus d\'énergie à digérer les protéines que les glucides ou les graisses — c\'est l\'effet thermique des aliments.", author: "Nutrition" },
  { text: "Le saviez-vous ? Le manque de sommeil réduit la leptine (hormone de satiété) et augmente la ghréline (hormone de faim) dès la première nuit courte.", author: "Physiologie" },
  { text: "Le saviez-vous ? La nature fractale (motifs répétés dans les arbres, les fougères, les nuages) réduit le stress de 60% selon des études en neurosciences.", author: "Recherche" },
  { text: "Le saviez-vous ? Les personnes qui lisent de la fiction ont une empathie plus développée et une meilleure régulation émotionnelle.", author: "Psychologie" },
  { text: "Le saviez-vous ? L\'exercice physique est le seul facteur prouvé pour augmenter le BDNF (facteur de croissance neuronal) — la molécule de l\'apprentissage.", author: "Neurosciences" },
  { text: "Le saviez-vous ? La pratique régulière d\'un instrument de musique épaissit le corps calleux du cerveau et améliore la coordination corps-esprit.", author: "Neurosciences" },
  { text: "Le saviez-vous ? L\'anxiété anticipatoire active le même circuit neuronal que la douleur physique. Le cerveau ne fait pas vraiment la différence.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Le sucre active les mêmes circuits de récompense que certaines drogues — la résistance physique à l\'addiction est réelle.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Les personnes qui font de la résistance (musculation) dorment 17% mieux que les sédentaires selon une méta-analyse de 2019.", author: "Recherche" },
  { text: "Le saviez-vous ? La chaleur perçue (pas seulement réelle) réduit la solitude — tenir une boisson chaude est physiologiquement lié à la connexion sociale.", author: "Psychologie" },
  { text: "Le saviez-vous ? Le cortisol mobilise le glucose pour l\'énergie d\'urgence — en chronique, ce mécanisme crée une résistance à l\'insuline.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les hormones thyroïdiennes, le cortisol et les œstrogènes forment un triangle de régulation métabolique interconnecté.", author: "Santé" },
  { text: "Le saviez-vous ? La méditation de compassion (metta) réduit l\'activité de l\'amygdale même face à des images de souffrance — elle recalibre la réponse au stress.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Un repas riche en tryptophane (œufs, dinde, noix) augmente la sérotonine cérébrale dans les 24h suivantes.", author: "Nutrition" },
  { text: "Le saviez-vous ? La peau est un organe sensoriel qui communique directement avec le système nerveux central via les récepteurs tactiles.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les personnes qui passent du temps en forêt ont un taux de NK cells (cellules tueuses naturelles) 40% plus élevé pendant 30 jours.", author: "Recherche" },
  { text: "Le saviez-vous ? Le corps humain contient environ 37 000 milliards de cellules. Chaque seconde, des millions se renouvellent.", author: "Biologie" },
  { text: "Le saviez-vous ? La lumière rouge et infrarouge (coucher de soleil, bougies) ne supprime pas la mélatonine et peut accompagner le soir sans perturber le sommeil.", author: "Chronobiologie" },
  { text: "Le saviez-vous ? Les gardiennes du sommeil profond sont les ondes delta — elles ne surviennent qu\'en l\'absence de lumière et de stress.", author: "Sommeil" },
  { text: "Le saviez-vous ? Le stress thermique doux (bain chaud, sauna) augmente les protéines de choc thermique qui protègent les cellules contre le vieillissement.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les personnes qui tiennent un tracker de leur routine maintiennent leurs habitudes 2 à 3 fois plus longtemps que celles qui ne trackent pas.", author: "Recherche" },
  { text: "Nommer ses émotions les rend moins intenses. C\'est la première étape pour ne pas en être prisonnière.", author: "Anonyme" },
  { text: "La guérison ressemble rarement à une ligne droite. Elle ressemble plutôt à une spirale — on repasse aux mêmes endroits mais un peu plus haut.", author: "Anonyme" },
  { text: "Tu peux te sentir épuisée et continuer quand même. Pas en forçant — en choisissant un tout petit pas.", author: "Anonyme" },
  { text: "Le corps n\'est pas un projet à corriger. C\'est un partenaire à apprivoiser.", author: "Anonyme" },
  { text: "Ce que tu ressens est valide. Ce que tu traverses est réel. Et tu t\'en sors.", author: "Anonyme" },
  { text: "La santé mentale et la santé physique ne sont pas deux choses séparées. Elles respirent ensemble.", author: "Anonyme" },
  { text: "Quelquefois, le plus courageux des actes est de se reposer.", author: "Anonyme" },
  { text: "Ta valeur n\'est pas mesurée à ta productivité.", author: "Anonyme" },
  { text: "L\'équilibre n\'est pas un état fixe. C\'est un mouvement permanent, une danse.", author: "Anonyme" },
  { text: "Faire confiance au processus, même quand on ne voit pas encore les résultats.", author: "Anonyme" },
  { text: "Chaque fois que tu honores un besoin de ton corps, tu reconstruis la confiance avec toi-même.", author: "Anonyme" },
  { text: "La force n\'est pas l\'absence de peur. C\'est avancer malgré elle.", author: "Anonyme" },
  { text: "Ce que tu cultives en toi fleurira un jour à l\'extérieur.", author: "Anonyme" },
  { text: "Tu n\'as pas besoin d\'être guérie pour mériter d\'être heureuse.", author: "Anonyme" },
  { text: "Les jours difficiles font partie du chemin, pas une preuve que tu t\'es égarée.", author: "Anonyme" },
  { text: "Respirer profondément est toujours disponible. C\'est ton ancre.", author: "Anonyme" },
  { text: "La bienveillance envers soi n\'est pas de la faiblesse. C\'est de la sagesse.", author: "Anonyme" },
  { text: "Un corps qui se déplace, même doucement, est un corps qui vit.", author: "Anonyme" },
  { text: "Ce que tu es est bien suffisant pour aujourd\'hui.", author: "Anonyme" },
  { text: "La patience envers soi-même est la forme la plus noble de l\'amour.", author: "Anonyme" },
  { text: "Chaque journée où tu prends soin de toi est une victoire, visible ou non.", author: "Anonyme" },
  { text: "La brume finit toujours par se lever. Même les matins les plus sombres ont leur lumière.", author: "Anonyme" },
  { text: "Tu es en train de construire quelque chose. Même si tu ne vois pas encore la maison.", author: "Anonyme" },
  { text: "Ce n\'est pas parce que tu ne le vois pas que ça ne pousse pas.", author: "Anonyme" },
  { text: "Être présente dans son corps, c\'est déjà un acte de guérison.", author: "Anonyme" },
  { text: "La régularité douce bat toujours la rigueur brutale.", author: "Anonyme" },
  { text: "Chaque habitude ancrée est une fondation. Tu construis sur du solide.", author: "Anonyme" },
  { text: "Prendre soin de soi, c\'est aussi prendre soin de ceux qu\'on aime.", author: "Anonyme" },
  { text: "Tu n\'es pas obligée de tout comprendre pour avancer.", author: "Anonyme" },
  { text: "Le chemin se fait en marchant. Commence.", author: "Antonio Machado" },
  { text: "Il n\'y a pas de petit geste quand c\'est un geste de soin.", author: "Anonyme" },
  { text: "Ton corps travaille pour toi 24h/24. Honore ce travail.", author: "Anonyme" },
  { text: "La santé est une conversation continue avec soi-même.", author: "Anonyme" },
  { text: "Chaque nuit de bon sommeil est un cadeau que tu te fais.", author: "Anonyme" },
  { text: "Le soin de soi n\'est pas du luxe. C\'est de la maintenance.", author: "Anonyme" },
  { text: "Tu as survécu à tous tes jours difficiles jusqu\'ici. Rappelle-t\'en.", author: "Anonyme" },
  { text: "L\'eau, le mouvement, le sommeil, la lumière. Quatre piliers simples, transformation profonde.", author: "Anonyme" },
  { text: "La cohérence est le pont entre les intentions et les résultats.", author: "Anonyme" },
  { text: "Ton futur moi te remerciera pour les gestes d\'aujourd\'hui.", author: "Anonyme" },
  { text: "Petit à petit, l\'oiseau fait son nid.", author: "Proverbe français" },
  { text: "On ne peut donner que ce qu\'on a. Remplis-toi d\'abord.", author: "Anonyme" },
  { text: "Le corps sait. Écoute-le.", author: "Anonyme" },
  { text: "Tip : L\'exposition au soleil entre 10h et 14h est la plus efficace pour synthétiser la vitamine D — 20 minutes suffisent en été.", author: "Santé" },
  { text: "Tip : Alterner chaud et froid sous la douche (30s chaud / 30s froid, 3 cycles) stimule la circulation lymphatique et réduit l\'inflammation.", author: "Bien-être" },
  { text: "Tip : Tenir ses épaules relâchées et sa posture droite pendant 2 minutes réduit le cortisol de 15% selon les recherches d\'Amy Cuddy.", author: "Recherche" },
  { text: "Tip : La micro-méditation de 60 secondes (fermer les yeux, observer 5 respirations) peut être pratiquée n\'importe où et n\'importe quand.", author: "Bien-être" },
  { text: "Tip : Mâcher lentement active la sécrétion d\'enzymes digestives et réduit la réponse inflammatoire post-repas.", author: "Nutrition" },
  { text: "Tip : Placer ses objectifs de santé par écrit les rend 42% plus susceptibles d\'être atteints selon une étude de l\'Université dominicaine.", author: "Recherche" },
  { text: "Tip : L\'huile de magnésium appliquée sur la peau après la douche peut compenser une carence en magnésium chez les personnes qui tolèrent mal les suppléments oraux.", author: "Santé" },
  { text: "Tip : Fixer un \'horaire de souci\' de 15 minutes par jour permet de contenir l\'anxiété chronique et de libérer le reste du temps.", author: "Psychologie" },
  { text: "Tip : Écouter de la musique à 60 BPM (baroque, lo-fi) synchronise les ondes cérébrales en alpha — état de relaxation concentrée.", author: "Bien-être" },
  { text: "Tip : Lire 6 minutes de fiction réduit le stress de 68% selon une étude de l\'Université de Sussex — plus efficace que la marche ou la musique.", author: "Recherche" },
  { text: "Tip : La luminothérapie de 10 minutes le matin peut remplacer partiellement l\'exposition naturelle en hiver — même effet sur le cortisol et la mélatonine.", author: "Chronobiologie" },
  { text: "Tip : Se lever et se coucher à la même heure le week-end stabilise le cortisol basal mieux que n\'importe quelle autre intervention.", author: "Chronobiologie" },
  { text: "Tip : Le contact avec la terre (jardinage sans gants, marche pieds nus) réduit l\'électrostatisme corporel et l\'inflammation mesurable.", author: "Bien-être" },
  { text: "Tip : Parler de ses inquiétudes à voix haute (même seule) externalise la charge mentale et réduit l\'activation de l\'amygdale.", author: "Psychologie" },
  { text: "Tip : Le body scan allongée (scanner son corps de la tête aux pieds sans jugement) est l\'une des techniques les plus efficaces contre l\'insomnie.", author: "Sommeil" },
  { text: "Tip : Programmer une alarme \'hydratation\' toutes les 2h aide à atteindre son objectif d\'eau quand la soif n\'est pas ressentie naturellement.", author: "Santé" },
  { text: "Tip : Faire une promenade sans téléphone une fois par semaine restaure la capacité d\'attention et réduit l\'anxiété liée aux notifications.", author: "Bien-être" },
  { text: "Tip : L\'auto-massage des pieds de 5 minutes avant de dormir active les points de réflexologie et détend profondément le système nerveux.", author: "Bien-être" },
  { text: "Tip : Les herbes adaptogènes (ashwagandha, rhodiola) peuvent interagir avec les SSRI — toujours consulter un médecin avant de les utiliser.", author: "Santé" },
  { text: "Tip : La cohérence cardiaque pratiquée juste après le repas réduit le pic glycémique postprandial.", author: "Nutrition" },
  { text: "Le saviez-vous ? L\'intestin grêle mesure environ 6 mètres de long et contient plus de 100 millions de neurones — plus que la moelle épinière.", author: "Biologie" },
  { text: "Le saviez-vous ? Les cicatrices émotionnelles activent les mêmes zones du cerveau que les cicatrices physiques — la douleur sociale est réelle.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Le corps produit naturellement des cannabinoïdes (endocannabinoïdes) qui régulent la douleur, l\'humeur et l\'appétit.", author: "Physiologie" },
  { text: "Le saviez-vous ? La pratique régulière du yoga réduit les marqueurs d\'inflammation (CRP, IL-6) autant que certains médicaments anti-inflammatoires.", author: "Recherche" },
  { text: "Le saviez-vous ? Le cerveau adulte génère environ 700 nouveaux neurones par jour dans l\'hippocampe — l\'exercice et le sommeil accélèrent ce processus.", author: "Neurosciences" },
  { text: "Le saviez-vous ? La dépression est souvent précédée d\'une dérégulation du cortisol de plusieurs mois avant les premiers symptômes.", author: "Recherche" },
  { text: "Le saviez-vous ? Les femmes qui pratiquent la musculation ont un meilleur équilibre hormonal que celles qui pratiquent uniquement le cardio.", author: "Recherche" },
  { text: "Le saviez-vous ? Le fer est essentiel à la production de sérotonine et de dopamine — une carence provoque fatigue ET dépression.", author: "Santé" },
  { text: "Le saviez-vous ? La méditation de pleine conscience modifie physiquement le cortex préfrontal en 8 semaines — des images IRM le montrent.", author: "Neurosciences" },
  { text: "Le saviez-vous ? La peur et la curiosité activent les mêmes structures cérébrales. Recadrer \'j\'ai peur\' en \'je suis curieuse\' change la réponse.", author: "Psychologie" },
  { text: "Le saviez-vous ? Le zinc est nécessaire à la production de testostérone chez les femmes — une carence peut réduire l\'énergie et la libido.", author: "Santé" },
  { text: "Le saviez-vous ? Les personnes qui ont des rituels du matin décrivent leur journée comme plus contrôlée et moins stressante, indépendamment des événements.", author: "Psychologie" },
  { text: "Le saviez-vous ? L\'aldostérone, libérée en même temps que le cortisol, provoque rétention d\'eau et ballonnements lors des pics de stress.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les études sur la longévité montrent que les liens sociaux protègent autant contre la mortalité prématurée que l\'arrêt du tabac.", author: "Recherche" },
  { text: "Le saviez-vous ? La gratitude active le cortex préfrontal médial et le cortex cingulaire antérieur — les zones de la paix intérieure.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Le chant choral réduit le cortisol et synchronise les rythmes cardiaques des chanteurs — créant un effet de cohésion biologique.", author: "Recherche" },
  { text: "Le saviez-vous ? Le corps brûle plus de calories la nuit qu\'on ne le pense — le métabolisme basal reste actif et représente 60-70% de la dépense totale.", author: "Physiologie" },
  { text: "Le saviez-vous ? La vitamine B12 est essentielle à la myélinisation des neurones — une carence provoque brouillard mental, fatigue et dépression.", author: "Santé" },
  { text: "Le saviez-vous ? Le simple fait de se sentir en sécurité (lieu familier, présence bienveillante) réduit le cortisol de façon mesurable.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les personnes créatives traversent souvent des périodes de haute sensibilité qui coïncident avec leurs pics de cortisol.", author: "Psychologie" },
  { text: "Le saviez-vous ? L\'acide folique (vitamine B9) joue un rôle dans la synthèse de la sérotonine — les légumes verts en sont la meilleure source.", author: "Nutrition" },
  { text: "Le saviez-vous ? La peau produit de la sérotonine en réponse à la lumière UV — c\'est pourquoi le soleil améliore l\'humeur de façon presque immédiate.", author: "Physiologie" },
  { text: "Le saviez-vous ? Le vieillissement est en partie causé par des cellules sénescentes qui sécrètent des molécules inflammatoires — l\'exercice aide à les éliminer.", author: "Recherche" },
  { text: "Le saviez-vous ? L\'ocytocine libérée par les liens sociaux réduit l\'inflammation systémique, protège le cœur et allonge la durée de vie.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les personnes qui dorment sur le côté évacuent mieux les déchets cérébraux par le système glymphatique.", author: "Sommeil" },
  { text: "Le saviez-vous ? Le cerveau consomme le glucose de façon prioritaire — le manque de sucre (hypoglycémie) affecte d\'abord les émotions et le jugement.", author: "Physiologie" },
  { text: "Le saviez-vous ? La pleine conscience augmente la densité de matière grise dans l\'insula, zone liée à la conscience corporelle.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Les herbes aromatiques (romarin, thym, basilic) contiennent des polyphénols qui modulent positivement le microbiome intestinal.", author: "Nutrition" },
  { text: "Le saviez-vous ? Les recherches sur le \'forest bathing\' (shinrin-yoku) montrent des effets positifs mesurables sur le cortisol dès 15 minutes.", author: "Recherche" },
  { text: "Le saviez-vous ? Le corps humain produit plus de chaleur au repos qu\'un réfrigérateur en fonctionnement — 80 watts en moyenne.", author: "Biologie" },
  { text: "Le saviez-vous ? Les pleurs de soulagement contiennent plus de protéines de stress que les pleurs de tristesse — le corps évacue littéralement.", author: "Physiologie" },
  { text: "Le saviez-vous ? La consommation de bouillon d\'os (collagène) améliore la qualité du sommeil et réduit l\'inflammation articulaire.", author: "Nutrition" },
  { text: "Le saviez-vous ? Les personnes qui cuisinent leurs propres repas ont une meilleure qualité nutritionnelle, moins d\'anxiété et un IMC plus stable.", author: "Recherche" },
  { text: "Le saviez-vous ? Le simple fait de toucher une plante ou de voir du vert pendant 3 minutes baisse la pression artérielle mesurable.", author: "Recherche" },
  { text: "Le saviez-vous ? L\'ocytocine peut être auto-générée par des pensées bienveillantes envers soi-même — pas besoin d\'interaction pour en bénéficier.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les femmes sont plus susceptibles de faire des insomnies lors des phases de stress hormonal (cycle, péri-ménopause).", author: "Santé" },
  { text: "Le saviez-vous ? Le microbiome intestinal influence directement la production de GABA, le neurotransmetteur de la sérénité.", author: "Physiologie" },
  { text: "Le saviez-vous ? La fibromyalgie, la fatigue chronique et le syndrome de l\'intestin irritable sont fréquemment associés à un cortisol dérégulé.", author: "Santé" },
  { text: "Le saviez-vous ? Le diaphragme est attaché aux vertèbres lombaires — les tensions émotionnelles stockées dans le bas du dos sont souvent diaphragmatiques.", author: "Physiologie" },
  { text: "Le saviez-vous ? Les personnes qui ont une pratique créative régulière ont statistiquement moins de burnout que celles qui n\'en ont pas.", author: "Recherche" },
  { text: "Le saviez-vous ? Le corps produit des endorphines pendant le yin yoga prolongé — c\'est pour ça qu\'on ressort souvent euphorique ou très apaisée.", author: "Physiologie" },
  { text: "Le saviez-vous ? L\'eau froide sur le visage active le réflexe de plongée des mammifères — réponse parasympathique immédiate et puissante.", author: "Physiologie" },
  { text: "Le saviez-vous ? La couleur verte est la plus facile à percevoir pour l\'œil humain et induit naturellement un état de repos cérébral.", author: "Neurosciences" },
  { text: "Le saviez-vous ? Les personnes qui se fixent des intentions (pas des résolutions) le matin ont une journée plus alignée avec leurs valeurs.", author: "Psychologie" },
  { text: "La vie n\'est pas d\'attendre que la tempête passe. C\'est d\'apprendre à danser sous la pluie.", author: "Vivian Greene" },
  { text: "Ne compare pas ton chapitre 1 avec le chapitre 20 de quelqu\'un d\'autre.", author: "Anonyme" },
  { text: "Tout ce que tu traverses te prépare pour ce que tu as demandé.", author: "Anonyme" },

function renderQuote() {
  // Same quote all day, changes each day of the year
  const now = new Date();
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  const q = QUOTES[dayOfYear % QUOTES.length];
  document.getElementById('quoteText').textContent = `« ${q.text} »`;
  document.getElementById('quoteAuthor').textContent = `— ${q.author}`;
}
